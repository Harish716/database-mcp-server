<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | AETHON</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 50px;
            background: #0d0d0d;
            min-height: 100vh;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 50px;
            background: rgba(0, 229, 255, 0.03);
            border: 1px solid rgba(0, 229, 255, 0.1);
            padding: 40px;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
        }

        .profile-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px;
            height: 100%;
            background: #00e5ff;
            box-shadow: 0 0 15px #00e5ff;
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: #171717;
            border: 2px solid #00e5ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00e5ff;
            font-size: 2.5rem;
            font-weight: 800;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
        }

        .profile-info h1 {
            font-size: 2.2rem;
            color: #fff;
            margin: 0 0 10px 0;
            font-weight: 600;
        }

        .role-badge {
            display: inline-block;
            background: rgba(0, 229, 255, 0.15);
            color: #00e5ff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            border: 1px solid rgba(0, 229, 255, 0.3);
            text-transform: uppercase;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .info-card {
            background: #171717;
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 12px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .info-card:hover {
            border-color: rgba(0, 229, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .info-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-value {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .value-mono {
            font-family: 'Space Mono', monospace;
            color: #00e5ff;
            font-size: 1rem;
        }

        .profile-actions {
            margin-top: 40px;
            display: flex;
            gap: 15px;
        }

        .btn-action {
            background: transparent;
            border: 1px solid #00e5ff;
            color: #00e5ff;
            padding: 12px 24px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-action:hover {
            background: rgba(0, 229, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        .btn-action.secondary {
            border-color: var(--text-muted);
            color: var(--text-muted);
        }

        .btn-action.secondary:hover {
            border-color: #fff;
            color: #fff;
            background: rgba(255,255,255,0.05);
            box-shadow: none;
        }

        .settings-card {
            background: #171717;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 30px;
            margin-top: 50px;
            max-width: 800px;
        }

        .settings-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .settings-title svg {
            color: #00e5ff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            background: #0d0d0d;
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 6px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #00e5ff;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 30px;
        }

        .btn-save {
            background: #00e5ff;
            color: #000;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-save:hover {
            background: #00b3cc;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }
        
        .loading {
            color: #00e5ff;
            font-size: 1.2rem;
            text-align: center;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div class="layout">
        <aside class="sidebar">
            <div class="brand">
                AETHON<br>
                <span style="font-size:0.7rem; color:var(--text-muted); font-weight: 500; letter-spacing: 0;">AI Database Control</span>
            </div>
            <nav id="sidebar-nav"></nav>
        </aside>

        <main class="main-content" data-lenis-prevent>
            <div id="loadingIndicator" class="loading">Loading Profile...</div>
            
            <div id="profileContent" style="display: none;">
                <div class="profile-header">
                    <div class="avatar" id="userAvatar">A</div>
                    <div class="profile-info">
                        <h1 id="userFullName">User Name</h1>
                        <div class="role-badge" id="userRole">ROLE</div>
                    </div>
                </div>

                <div class="profile-grid" id="profileGrid">
                    <!-- Core Info (Admin & Employee) -->
                    <div class="info-card">
                        <div class="info-label">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                            Email Address
                        </div>
                        <div class="info-value" id="userEmail">email@example.com</div>
                    </div>
                    
                    <div class="info-card">
                        <div class="info-label">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            Account Status
                        </div>
                        <div class="info-value value-mono" id="userStatus" style="color: #69f0ae;">ACTIVE</div>
                    </div>

                    <!-- Employee Specific Fields (Injected dynamically) -->
                </div>

                <div class="settings-card">
                    <div class="settings-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        Profile Settings
                    </div>

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="settingName" value="" readonly>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="text" id="settingEmail" value="" readonly>
                    </div>

                    <div class="form-group">
                        <label>Role</label>
                        <input type="text" id="settingRole" value="" readonly>
                    </div>

                    <div class="form-actions">
                        <button class="btn-save" onclick="alert('Profile changes saved successfully!')">Save Changes</button>
                    </div>
                </div>

                <div class="settings-card">
                    <div class="settings-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a472fa" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                        Security Settings
                    </div>

                    <div class="form-group">
                        <label>Current Password</label>
                        <input type="password" placeholder="••••••••">
                    </div>

                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" placeholder="••••••••">
                    </div>

                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <input type="password" placeholder="••••••••">
                    </div>

                    <div class="form-actions">
                        <button class="btn-save" onclick="alert('Password updated successfully!')" style="background: transparent; border: 1px solid #00e5ff; color: #00e5ff;">Update Password</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('aethon_token');
            if (!token) window.location.href = '/login.html';

            try {
                const res = await fetch('/api/profile', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (res.ok) {
                    const profile = await res.json();
                    
                    document.getElementById('loadingIndicator').style.display = 'none';
                    document.getElementById('profileContent').style.display = 'block';

                    document.getElementById('userFullName').innerText = profile.full_name;
                    document.getElementById('userAvatar').innerText = profile.full_name.charAt(0).toUpperCase();
                    document.getElementById('userRole').innerText = profile.role;
                    document.getElementById('userEmail').innerText = profile.email;
                    
                    if (profile.status === 'ACTIVE' || profile.employment_status === 'ACTIVE') {
                        document.getElementById('userStatus').innerText = 'ACTIVE';
                        document.getElementById('userStatus').style.color = '#00e676';
                    } else {
                        document.getElementById('userStatus').innerText = profile.employment_status || profile.status || 'INACTIVE';
                        document.getElementById('userStatus').style.color = '#ff5252';
                    }

                    // Populate Settings Inputs
                    document.getElementById('settingName').value = profile.full_name || '';
                    document.getElementById('settingEmail').value = profile.email || '';
                    document.getElementById('settingRole').value = profile.role === 'ADMIN' ? 'Administrator' : 'Employee';

                    // If Employee, inject extra cards
                    if (profile.role === 'EMPLOYEE' && profile.employee_code) {
                        const grid = document.getElementById('profileGrid');
                        
                        const empCards = `
                            <div class="info-card">
                                <div class="info-label">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
                                    Employee ID
                                </div>
                                <div class="info-value value-mono">${profile.employee_code}</div>
                            </div>
                            <div class="info-card">
                                <div class="info-label">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                                    Department
                                </div>
                                <div class="info-value">${profile.department_name || 'N/A'}</div>
                            </div>
                            <div class="info-card">
                                <div class="info-label">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                                    Designation
                                </div>
                                <div class="info-value">${profile.designation || 'N/A'}</div>
                            </div>
                            <div class="info-card">
                                <div class="info-label">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                                    Phone Number
                                </div>
                                <div class="info-value value-mono">${profile.phone || 'N/A'}</div>
                            </div>
                        `;
                        grid.innerHTML += empCards;
                    }
                } else {
                    document.getElementById('loadingIndicator').innerText = "Failed to load profile data.";
                }
            } catch (e) {
                console.error(e);
                document.getElementById('loadingIndicator').innerText = "Error connecting to server.";
            }
        });
    </script>
</body>
</html>
